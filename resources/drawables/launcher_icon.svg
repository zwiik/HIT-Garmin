<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#000000" stroke="#FFFF00" stroke-width="4" />
  
  <!-- Stopwatch Ticks -->
  <line x1="50" y1="2" x2="50" y2="10" stroke="#FFFF00" stroke-width="4" />
  <line x1="50" y1="90" x2="50" y2="98" stroke="#00FF00" stroke-width="4" />
  <line x1="90" y1="50" x2="98" y2="50" stroke="#FFFF00" stroke-width="4" />
  <line x1="2" y1="50" x2="10" y2="50" stroke="#FFFF00" stroke-width="4" />

  <!-- Text "HIT" -->
  <text x="50" y="60" font-family="Arial, sans-serif" font-weight="bold" font-size="35" fill="#FFFF00" text-anchor="middle">HIT</text>
  
  <!-- "120s" small text below -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="14" fill="#00FF00" text-anchor="middle">120s</text>
</svg>